<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Default Detector | By Deepesh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; color: #333; }
        nav { background: #0a1931; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .logo { color: #f0c040; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        nav .logo span { color: white; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        nav ul li a:hover { color: #f0c040; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .hamburger span { width: 25px; height: 3px; background: white; border-radius: 3px; }
        .hero { background: linear-gradient(135deg, #0a1931 0%, #1a3a5c 50%, #0a1931 100%); min-height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; width: 600px; height: 600px; background: rgba(240, 192, 64, 0.05); border-radius: 50%; top: -100px; right: -100px; }
        .hero-content { position: relative; z-index: 1; }
        .hero-badge { display: inline-block; background: rgba(240, 192, 64, 0.15); color: #f0c040; padding: 8px 20px; border-radius: 50px; font-size: 13px; font-weight: 600; margin-bottom: 25px; border: 1px solid rgba(240, 192, 64, 0.3); }
        .hero h1 { font-size: 56px; font-weight: 800; color: white; line-height: 1.1; margin-bottom: 20px; }
        .hero h1 span { color: #f0c040; }
        .hero p { font-size: 18px; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 40px; line-height: 1.8; }
        .hero-btn { display: inline-block; background: #f0c040; color: #0a1931; padding: 18px 45px; border-radius: 50px; font-size: 16px; font-weight: 700; text-decoration: none; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 10px 30px rgba(240, 192, 64, 0.3); }
        .hero-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(240, 192, 64, 0.4); }
        .hero-stats { display: flex; justify-content: center; gap: 60px; margin-top: 60px; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat h3 { font-size: 36px; font-weight: 800; color: #f0c040; }
        .stat p { font-size: 13px; color: rgba(255,255,255,0.6); }
        .how-section { padding: 80px 40px; background: white; }
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 36px; font-weight: 800; color: #0a1931; }
        .section-title h2 span { color: #f0c040; }
        .section-title p { color: #666; margin-top: 10px; }
        .steps { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .step-card { text-align: center; max-width: 250px; flex: 1; min-width: 200px; }
        .step-icon { width: 80px; height: 80px; background: #f0c040; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
        .step-card h3 { color: #0a1931; margin-bottom: 10px; }
        .step-card p { color: #666; font-size: 14px; line-height: 1.7; }
        .predict-section { padding: 80px 20px; background: #f0f4f8; }
        .predict-box { max-width: 700px; margin: 0 auto; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group label { display: block; font-weight: 600; color: #0a1931; margin-bottom: 8px; font-size: 14px; }
        .form-group label span { cursor: help; color: #f0c040; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; font-family: 'Poppins', sans-serif; transition: border 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: #f0c040; }
        .full-width { grid-column: 1 / -1; }
        .predict-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #0a1931, #1a3a5c); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 25px; font-family: 'Poppins', sans-serif; transition: opacity 0.3s; }
        .predict-btn:hover { opacity: 0.9; }
        .result-box { display: none; margin-top: 30px; padding: 25px; border-radius: 15px; text-align: center; }
        .result-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 15px; }
        .risk-bar-bg { background: #e0e0e0; border-radius: 50px; height: 20px; overflow: hidden; }
        .risk-bar { height: 100%; border-radius: 50px; transition: width 1s ease; }
        .risk-label { margin-top: 10px; font-weight: 600; font-size: 14px; }
        .terms-section { padding: 80px 40px; background: white; }
        .terms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .term-card { background: #f0f4f8; padding: 30px; border-radius: 15px; border-left: 5px solid #f0c040; }
        .term-card .icon { font-size: 36px; margin-bottom: 15px; }
        .term-card h3 { color: #0a1931; margin-bottom: 10px; }
        .term-card p { color: #666; font-size: 14px; line-height: 1.7; }
        .about-section { padding: 80px 40px; background: linear-gradient(135deg, #0a1931, #1a3a5c); text-align: center; }
        .about-section h2 { font-size: 36px; font-weight: 800; color: white; margin-bottom: 10px; }
        .about-section h2 span { color: #f0c040; }
        .about-section > p { color: rgba(255,255,255,0.6); margin-bottom: 50px; }
        .about-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); max-width: 400px; margin: 0 auto; padding: 40px; border-radius: 20px; }
        .about-avatar { width: 80px; height: 80px; background: #f0c040; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; }
        .about-card h3 { color: white; font-size: 24px; font-weight: 700; }
        .about-card .college { color: #f0c040; margin: 5px 0 15px; }
        .about-card .dept { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 20px; }
        .tags { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tag { background: rgba(240,192,64,0.15); color: #f0c040; padding: 5px 15px; border-radius: 50px; font-size: 12px; border: 1px solid rgba(240,192,64,0.3); }
        footer { background: #0a1931; padding: 30px 40px; text-align: center; }
        footer p { color: rgba(255,255,255,0.5); font-size: 14px; }
        footer p span { color: #f0c040; }
        footer .sub { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 5px; }
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            nav ul { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: #0a1931; padding: 20px; gap: 15px; }
            nav ul.open { display: flex; }
            .hamburger { display: flex; }
            .hero h1 { font-size: 36px; }
            .hero p { font-size: 15px; }
            .hero-stats { gap: 30px; }
            .stat h3 { font-size: 26px; }
            .how-section { padding: 60px 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .predict-box { padding: 30px 20px; }
            .terms-section { padding: 60px 20px; }
            .about-section { padding: 60px 20px; }
            footer { padding: 20px; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 28px; }
            .hero-btn { padding: 14px 30px; font-size: 14px; }
            .hero-stats { flex-direction: column; gap: 20px; }
            .section-title h2 { font-size: 26px; }
        }
    </style>
</head>

        <div class="logo">🏦 Loan<span>Guard</span></div>
        <ul id="nav-menu">

            <li><a href="#terms">Banking Terms</a></li>
            <li><a href="#about">About</a></li>
        </ul>

            <span></span><span></span><span></span>
        </div>
    </nav>
